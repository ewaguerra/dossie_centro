<!DOCTYPE html>
<html><head>
<meta charset="utf-8" />
<title>Test Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="/vendor/maplibre/maplibre-gl.js"></script>
<link href="/vendor/maplibre/maplibre-gl.css" rel="stylesheet" />
<style>body{margin:0}#map{width:100vw;height:100vh}</style>
</head><body>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [-46.6361, -23.5505],
    zoom: 14
});
map.on('load', () => {
    map.addSource('test', {
        type: 'geojson',
        data: {
            type: 'FeatureCollection',
            features: [{
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [-46.6361, -23.5505] },
                properties: { name: 'Teste' }
            }]
        }
    });
    map.addLayer({
        id: 'test-circle',
        type: 'circle',
        source: 'test',
        paint: { 'circle-radius': 20, 'circle-color': '#ff0000', 'circle-opacity': 0.8 }
    });
    console.log('✅ Teste: camada adicionada');
});
</script></body></html>
